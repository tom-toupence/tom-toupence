name: Generate Animated Pac-Man

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate dark SVG
        run: node scripts/pacman-animated.js --user=tom-toupence --theme=dark --out=dist/pacman-contribution-graph.svg

      - name: Generate light SVG
        run: node scripts/pacman-animated.js --user=tom-toupence --theme=light --out=dist/pacman-contribution-graph-light.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
